<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisa — Do Aeroporto ao Quarto de Hotel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #333;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 40px 32px;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #e0e0e0;
    border-top-color: #4a90d9;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 15px; color: #666; line-height: 1.5; }
  .fallback { display: none; margin-top: 20px; }
  .fallback a {
    display: inline-block;
    padding: 10px 24px;
    background: #4a90d9;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <p>Carregando pesquisa...</p>
  <div class="fallback" id="fallback">
    <p style="margin-bottom:12px;">Se não foi redirecionado automaticamente:</p>
    <a id="fallback-link" href="#">Clique aqui para acessar</a>
  </div>
</div>

<script>
// =====================================================
// CONFIGURAÇÃO — Cole aqui os links dos seus dois forms
// =====================================================
var FORM_A = "https://tally.so/r/Pd0o9x";
var FORM_B = "https://tally.so/r/xXZGpv";
// =====================================================

var chosen = Math.random() < 0.5 ? FORM_A : FORM_B;

// Redireciona imediatamente
window.location.href = chosen;

// Fallback: se o redirect não funcionar em 3 segundos, mostra o link
setTimeout(function() {
  var fb = document.getElementById("fallback");
  var fl = document.getElementById("fallback-link");
  fb.style.display = "block";
  fl.href = chosen;
}, 3000);
</script>
</body>
</html>
